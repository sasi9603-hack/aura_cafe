<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="100%" height="100%">
  <defs>
    <linearGradient id="placeholder-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  <rect width="300" height="200" fill="url(#placeholder-grad)"/>
  <g transform="translate(150, 90)" text-anchor="middle">
    <!-- Plate and cutlery icon representation -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#475569" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,4"/>
    <!-- Fork -->
    <path d="M -45 -15 L -45 15 M -48 -15 L -42 -15 M -45 -15 L -45 -5" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
    <!-- Knife -->
    <path d="M 45 -15 L 45 15 M 42 -15 L 48 -15" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
    <!-- Text -->
    <text x="0" y="55" fill="#94a3b8" font-size="12" font-weight="600" font-family="system-ui, -apple-system, sans-serif" letter-spacing="1">AURA CAFE</text>
    <text x="0" y="72" fill="#64748b" font-size="10" font-family="system-ui, -apple-system, sans-serif">Photo Not Available</text>
  </g>
</svg>
